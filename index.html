<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows VM · x86 Emulator</title>

    <style>
        /* ── Reset & Base ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at 30% 20%, #1a1e2c, #0b0d14);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
            margin: 0;
        }

        .vm-wrapper {
            width: 100%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 32px;
            padding: 24px 24px 28px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.06) inset, 0 0 40px rgba(0, 180, 255, 0.04);
            transition: all 0.3s ease;
        }

        .vm-wrapper:hover {
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.08) inset, 0 0 60px rgba(0, 180, 255, 0.06);
        }

        /* ── Header ── */
        .vm-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6px 16px 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
            gap: 12px;
        }

        .vm-header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .vm-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vm-logo svg {
            width: 28px;
            height: 28px;
            filter: drop-shadow(0 0 6px rgba(0, 160, 255, 0.3));
        }

        .vm-logo span {
            font-weight: 600;
            font-size: 18px;
            color: #f0f4ff;
            letter-spacing: -0.3px;
        }

        .vm-logo small {
            font-weight: 400;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.3px;
            margin-left: 4px;
        }

        .vm-status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 14px 5px 12px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4a5568;
            transition: background 0.4s ease, box-shadow 0.4s ease;
            display: inline-block;
        }

        .status-dot.running {
            background: #4ade80;
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.4);
        }
        .status-dot.paused {
            background: #facc15;
            box-shadow: 0 0 12px rgba(250, 204, 21, 0.35);
        }
        .status-dot.stopped {
            background: #f87171;
            box-shadow: 0 0 12px rgba(248, 113, 113, 0.3);
        }

        /* ── Screen ── */
        .vm-screen-wrapper {
            position: relative;
            margin-top: 18px;
            border-radius: 20px;
            overflow: hidden;
            background: #0a0c12;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05), 0 20px 60px rgba(0, 0, 0, 0.6);
            aspect-ratio: 4 / 3;
            width: 100%;
        }

        .vm-screen-wrapper canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            background: #0a0c12;
        }

        .vm-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 12, 18, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            gap: 18px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 2;
        }

        .vm-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .vm-overlay .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255, 255, 255, 0.06);
            border-top: 3px solid rgba(100, 180, 255, 0.5);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .vm-overlay .overlay-text {
            font-weight: 400;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.35);
            text-align: center;
            max-width: 80%;
        }

        .vm-overlay .overlay-text strong {
            color: rgba(255, 255, 255, 0.55);
            font-weight: 500;
        }

        /* ── Controls ── */
        .vm-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-top: 18px;
            padding: 0 4px;
        }

        .vm-controls .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .vm-controls button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.07);
            color: rgba(255, 255, 255, 0.6);
            padding: 8px 18px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 7px;
            font-family: inherit;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .vm-controls button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.12);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .vm-controls button:active:not(:disabled) {
            transform: translateY(0px);
        }

        .vm-controls button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        .vm-controls button.success {
            background: rgba(74, 222, 128, 0.12);
            border-color: rgba(74, 222, 128, 0.18);
            color: rgba(134, 239, 172, 0.8);
        }

        .vm-controls button.success:hover:not(:disabled) {
            background: rgba(74, 222, 128, 0.22);
            border-color: rgba(74, 222, 128, 0.3);
            color: #fff;
        }

        .vm-controls button.danger {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.2);
            color: rgba(252, 165, 165, 0.8);
        }

        .vm-controls button.danger:hover:not(:disabled) {
            background: rgba(239, 68, 68, 0.25);
            border-color: rgba(239, 68, 68, 0.35);
            color: #fff;
        }

        .vm-controls .spacer {
            flex: 1;
            min-width: 12px;
        }

        .vm-controls .file-input-wrap {
            position: relative;
            display: inline-flex;
        }

        .vm-controls .file-input-wrap input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .vm-controls .file-input-wrap button {
            pointer-events: none;
        }

        /* ── Status Bar ── */
        .vm-statusbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding: 8px 12px 0 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
            flex-wrap: wrap;
            gap: 6px;
        }

        .vm-statusbar .left,
        .vm-statusbar .right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .vm-statusbar .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .vm-statusbar .stat-item .label {
            opacity: 0.4;
        }

        .vm-statusbar .stat-item .value {
            color: rgba(255, 255, 255, 0.55);
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        @media (max-width: 700px) {
            .vm-wrapper {
                padding: 16px;
                border-radius: 24px;
            }
            .vm-header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .vm-header-left {
                flex-wrap: wrap;
            }
            .vm-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .vm-controls .btn-group {
                justify-content: center;
            }
            .vm-controls .spacer {
                display: none;
            }
            .vm-statusbar {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
                gap: 4px;
            }
            .vm-statusbar .left,
            .vm-statusbar .right {
                justify-content: center;
                flex-wrap: wrap;
            }
        }

        @media (max-width: 480px) {
            .vm-wrapper {
                padding: 12px;
                border-radius: 18px;
            }
            .vm-controls button {
                padding: 6px 12px;
                font-size: 12px;
            }
            .vm-logo span {
                font-size: 15px;
            }
            .vm-logo small {
                font-size: 11px;
            }
        }

        ::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="vm-wrapper" id="app">
        <!-- HEADER -->
        <header class="vm-header">
            <div class="vm-header-left">
                <div class="vm-logo">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="2" width="9" height="9" rx="1" fill="#4ade80" opacity="0.7" />
                        <rect x="13" y="2" width="9" height="9" rx="1" fill="#60a5fa" opacity="0.7" />
                        <rect x="2" y="13" width="9" height="9" rx="1" fill="#fbbf24" opacity="0.7" />
                        <rect x="13" y="13" width="9" height="9" rx="1" fill="#f87171" opacity="0.7" />
                    </svg>
                    <span>Virtual PC <small>· x86</small></span>
                </div>
                <div class="vm-status-badge">
                    <span class="status-dot stopped" id="statusDot"></span>
                    <span id="statusLabel">Stopped</span>
                </div>
            </div>
        </header>

        <!-- SCREEN -->
        <div class="vm-screen-wrapper" id="screenWrapper">
            <canvas id="v86Canvas" width="800" height="600"></canvas>
            <div class="vm-overlay visible" id="overlay">
                <div class="spinner" id="spinner"></div>
                <div class="overlay-text" id="overlayText">
                    <strong>Loading v86 library…</strong>
                </div>
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="vm-controls">
            <div class="btn-group">
                <button class="success" id="btnStart" disabled>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <polygon points="4,2 14,8 4,14" />
                    </svg>
                    Start
                </button>
                <button id="btnPause" disabled>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <rect x="4" y="2" width="3" height="12" rx="0.5" />
                        <rect x="9" y="2" width="3" height="12" rx="0.5" />
                    </svg>
                    Pause
                </button>
                <button class="danger" id="btnReset" disabled>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 8a6 6 0 1 1 1.5 4.2" />
                        <path d="M2 2v4h4" />
                    </svg>
                    Reset
                </button>
            </div>
            <div class="spacer"></div>
            <div class="btn-group">
                <div class="file-input-wrap">
                    <button id="btnLoadImage" disabled>
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                            <path d="M2 10v3a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-3" />
                            <path d="M8 2v8" />
                            <path d="M5 7l3 3 3-3" />
                        </svg>
                        Load Image
                    </button>
                    <input type="file" id="fileInput" accept=".img,.iso,.bin,.raw" disabled />
                </div>
                <button id="btnFullscreen" disabled>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                        <path d="M2 5V3a1 1 0 0 1 1-1h2" />
                        <path d="M11 2h2a1 1 0 0 1 1 1v2" />
                        <path d="M14 11v2a1 1 0 0 1-1 1h-2" />
                        <path d="M5 14H3a1 1 0 0 1-1-1v-2" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- STATUS BAR -->
        <div class="vm-statusbar">
            <div class="left">
                <span class="stat-item">
                    <span class="label">OS</span>
                    <span class="value" id="osLabel">Windows 98</span>
                </span>
                <span class="stat-item">
                    <span class="label">Memory</span>
                    <span class="value" id="memLabel">128 MB</span>
                </span>
                <span class="stat-item">
                    <span class="label">State</span>
                    <span class="value" id="stateLabel">—</span>
                </span>
            </div>
            <div class="right">
                <span class="stat-item">
                    <span class="label">v86</span>
                    <span class="value" id="v86Status">⏳ loading</span>
                </span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ─── DOM refs ───
            const canvas = document.getElementById('v86Canvas');
            const overlay = document.getElementById('overlay');
            const overlayText = document.getElementById('overlayText');
            const spinner = document.getElementById('spinner');
            const statusDot = document.getElementById('statusDot');
            const statusLabel = document.getElementById('statusLabel');
            const stateLabel = document.getElementById('stateLabel');
            const v86Status = document.getElementById('v86Status');

            const btnStart = document.getElementById('btnStart');
            const btnPause = document.getElementById('btnPause');
            const btnReset = document.getElementById('btnReset');
            const btnLoadImage = document.getElementById('btnLoadImage');
            const btnFullscreen = document.getElementById('btnFullscreen');
            const fileInput = document.getElementById('fileInput');

            // ─── Constants ───
            const CDN_BASE = 'https://copy.sh/v86/';
            const BIOS_URL = CDN_BASE + 'bios/seabios.bin';
            const VGABIOS_URL = CDN_BASE + 'bios/vgabios.bin';
            const DEFAULT_IMAGE_URL = CDN_BASE + 'images/windows98.img';

            // List of CDN URLs to try (in order)
            const CDN_URLS = [
                'https://cdn.jsdelivr.net/npm/v86@1.2.1/build/v86.js',
                'https://unpkg.com/v86@1.2.1/build/v86.js',
                'https://copy.sh/v86/v86.js' // fallback to original
            ];

            // ─── State ───
            let emulator = null;
            let vmState = 'stopped';
            let imageUrl = DEFAULT_IMAGE_URL;
            let imageFile = null;
            let isStarting = false;
            let libraryLoaded = false;

            // ─── UI helpers ───
            function setStatus(state) {
                vmState = state;
                statusDot.className = 'status-dot';
                if (state === 'running') {
                    statusDot.classList.add('running');
                    statusLabel.textContent = 'Running';
                    stateLabel.textContent = 'Active';
                } else if (state === 'paused') {
                    statusDot.classList.add('paused');
                    statusLabel.textContent = 'Paused';
                    stateLabel.textContent = 'Paused';
                } else {
                    statusDot.classList.add('stopped');
                    statusLabel.textContent = 'Stopped';
                    stateLabel.textContent = '—';
                }

                btnStart.disabled = (state === 'running' || state === 'paused' || isStarting || !libraryLoaded);
                btnPause.disabled = (state === 'stopped' || isStarting || !libraryLoaded);
                btnReset.disabled = (state === 'stopped' || isStarting || !libraryLoaded);
                btnLoadImage.disabled = !libraryLoaded;
                fileInput.disabled = !libraryLoaded;
                btnFullscreen.disabled = !libraryLoaded;

                if (state === 'paused') {
                    btnPause.textContent = 'Resume';
                } else {
                    btnPause.innerHTML =
                        '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="4" y="2" width="3" height="12" rx="0.5"/><rect x="9" y="2" width="3" height="12" rx="0.5"/></svg> Pause';
                }

                if (state === 'stopped') {
                    overlay.classList.add('visible');
                    spinner.style.display = 'none';
                    overlayText.innerHTML = '<strong>Windows VM</strong> · click <strong>Start</strong> to boot';
                } else if (state === 'running') {
                    overlay.classList.remove('visible');
                } else if (state === 'paused') {
                    overlay.classList.add('visible');
                    spinner.style.display = 'none';
                    overlayText.innerHTML = '<strong>Paused</strong> · click <strong>Resume</strong> to continue';
                }
            }

            function showLoading(msg) {
                overlay.classList.add('visible');
                spinner.style.display = 'block';
                overlayText.innerHTML = msg || 'Loading...';
            }

            function hideOverlay() {
                overlay.classList.remove('visible');
                spinner.style.display = 'none';
            }

            function setLibraryStatus(text, isError = false) {
                v86Status.textContent = text;
                v86Status.style.color = isError ? '#f87171' : 'rgba(255,255,255,0.55)';
            }

            // ─── Dynamic script loader ───
            function loadScript(url) {
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = url;
                    script.async = true;
                    script.onload = () => resolve(url);
                    script.onerror = () => reject(url);
                    document.head.appendChild(script);
                });
            }

            async function loadLibrary() {
                let success = false;
                for (const url of CDN_URLS) {
                    try {
                        setLibraryStatus(`Trying ${url.split('/')[2]}…`);
                        await loadScript(url);
                        // Check if V86 is defined
                        if (typeof V86 !== 'undefined') {
                            libraryLoaded = true;
                            setLibraryStatus('✓ loaded');
                            return true;
                        } else {
                            // script loaded but V86 not defined (unlikely)
                            console.warn('Script loaded but V86 not defined from', url);
                        }
                    } catch (err) {
                        console.warn('Failed to load from', url, err);
                    }
                }
                return false;
            }

            // ─── Emulator ───
            function createEmulator(imageSource) {
                if (emulator) {
                    try { emulator.destroy(); } catch (_) {}
                    emulator = null;
                }

                const config = {
                    screen_container: canvas,
                    bios: { url: BIOS_URL },
                    vga_bios: { url: VGABIOS_URL },
                    autostart: false,
                    memory_size: 128 * 1024 * 1024,
                    vga_memory_size: 8 * 1024 * 1024,
                    hda: null,
                    fda: null,
                    cdrom: null,
                    network_relay_url: null,
                };

                if (imageFile instanceof File) {
                    showLoading('Loading disk image…');
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        config.hda = { buffer: e.target.result };
                        initEmulator(config);
                    };
                    reader.onerror = function() {
                        alert('Failed to read image file.');
                        setStatus('stopped');
                        isStarting = false;
                    };
                    reader.readAsArrayBuffer(imageFile);
                    return;
                }

                if (typeof imageSource === 'string' && imageSource.startsWith('http')) {
                    config.hda = { url: imageSource };
                    initEmulator(config);
                    return;
                }

                config.hda = { url: DEFAULT_IMAGE_URL };
                initEmulator(config);
            }

            function initEmulator(config) {
                try {
                    emulator = new V86(config);
                    emulator.add_listener('emulator-loaded', function() {
                        hideOverlay();
                        setStatus('running');
                        isStarting = false;
                    });
                    emulator.add_listener('emulator-started', function() {
                        hideOverlay();
                        setStatus('running');
                        isStarting = false;
                    });
                    emulator.add_listener('emulator-paused', function() {
                        setStatus('paused');
                    });
                    emulator.add_listener('emulator-resumed', function() {
                        hideOverlay();
                        setStatus('running');
                    });
                    emulator.add_listener('emulator-stopped', function() {
                        setStatus('stopped');
                        isStarting = false;
                    });
                    emulator.add_listener('error', function(err) {
                        console.error('v86 error:', err);
                        setStatus('stopped');
                        isStarting = false;
                        overlay.classList.add('visible');
                        spinner.style.display = 'none';
                        overlayText.innerHTML =
                            '<strong>Error</strong> · ' + (err.message || 'Failed to boot.') +
                            ' <br><span style="font-size:12px;opacity:0.5;">Try loading a different disk image.</span>';
                    });

                    showLoading('Booting Windows…');
                    setStatus('stopped');
                    emulator.run();
                } catch (err) {
                    console.error('Init error:', err);
                    setStatus('stopped');
                    isStarting = false;
                    overlay.classList.add('visible');
                    spinner.style.display = 'none';
                    overlayText.innerHTML = '<strong>Init Error</strong> · ' + err.message;
                }
            }

            // ─── Controls ───
            function startVM() {
                if (!libraryLoaded || isStarting) return;
                if (emulator) {
                    try {
                        emulator.run();
                        showLoading('Booting…');
                        setStatus('stopped');
                        return;
                    } catch (_) {}
                }
                isStarting = true;
                setStatus('stopped');
                createEmulator(imageUrl);
            }

            function togglePause() {
                if (!emulator || !libraryLoaded) return;
                try {
                    if (vmState === 'running') emulator.pause();
                    else if (vmState === 'paused') emulator.resume();
                } catch (err) {
                    console.warn('Pause error:', err);
                }
            }

            function resetVM() {
                if (!emulator || !libraryLoaded) return;
                try {
                    emulator.stop();
                    setTimeout(() => {
                        try {
                            emulator.run();
                            showLoading('Resetting…');
                            setStatus('stopped');
                        } catch (_) {
                            setStatus('stopped');
                            isStarting = false;
                        }
                    }, 300);
                } catch (err) {
                    console.warn('Reset error:', err);
                    setStatus('stopped');
                    isStarting = false;
                }
            }

            function loadImage(file) {
                if (!file || !libraryLoaded) return;
                const name = file.name.toLowerCase();
                if (!name.endsWith('.img') && !name.endsWith('.iso') && !name.endsWith('.bin') && !name.endsWith('.raw')) {
                    if (!confirm('The file "' + file.name + '" may not be a valid disk image. Load anyway?')) return;
                }
                if (emulator) {
                    try { emulator.stop(); } catch (_) {}
                    try { emulator.destroy(); } catch (_) {}
                    emulator = null;
                }
                imageFile = file;
                imageUrl = null;
                setStatus('stopped');
                overlay.classList.add('visible');
                spinner.style.display = 'none';
                overlayText.innerHTML = 'Image loaded: <strong>' + file.name + '</strong> · click <strong>Start</strong> to boot';
                document.getElementById('osLabel').textContent = file.name.replace(/\.[^.]+$/, '') || 'Custom Image';
            }

            function toggleFullscreen() {
                const wrapper = document.querySelector('.vm-wrapper');
                if (!document.fullscreenElement) {
                    wrapper.requestFullscreen?.() || wrapper.webkitRequestFullscreen?.();
                } else {
                    document.exitFullscreen?.() || document.webkitExitFullscreen?.();
                }
            }

            // ─── Event listeners ───
            btnStart.addEventListener('click', startVM);
            btnPause.addEventListener('click', togglePause);
            btnReset.addEventListener('click', resetVM);
            btnFullscreen.addEventListener('click', toggleFullscreen);

            fileInput.addEventListener('change', function(e) {
                if (this.files && this.files[0]) {
                    loadImage(this.files[0]);
                }
                this.value = '';
            });

            document.addEventListener('keydown', function(e) {
                if (!libraryLoaded) return;
                if (e.ctrlKey && e.altKey && e.key === 's') { e.preventDefault();
                    startVM(); }
                if (e.ctrlKey && e.altKey && e.key === 'p') { e.preventDefault();
                    togglePause(); }
                if (e.ctrlKey && e.altKey && e.key === 'r') { e.preventDefault();
                    resetVM(); }
                if (e.ctrlKey && e.altKey && e.key === 'f') { e.preventDefault();
                    toggleFullscreen(); }
            });

            overlay.addEventListener('click', function(e) {
                if (vmState === 'stopped' && !isStarting && libraryLoaded) startVM();
                else if (vmState === 'paused' && libraryLoaded) togglePause();
            });

            // ─── Boot: load library first ───
            (async function init() {
                // show initial loading
                overlay.classList.add('visible');
                spinner.style.display = 'block';
                overlayText.innerHTML = '<strong>Loading v86 emulator…</strong>';
                setLibraryStatus('⏳ loading');
                const loaded = await loadLibrary();
                if (loaded) {
                    setLibraryStatus('✓ ready');
                    setStatus('stopped');
                    overlay.classList.add('visible');
                    spinner.style.display = 'none';
                    overlayText.innerHTML = '<strong>Windows VM</strong> · click <strong>Start</strong> to boot';
                    console.log('%c🖥️  Windows VM · v86 Emulator ready', 'font-size:18px;font-weight:600;color:#60a5fa;');
                    console.log('  Start:   Ctrl+Alt+S');
                    console.log('  Pause:   Ctrl+Alt+P');
                    console.log('  Reset:   Ctrl+Alt+R');
                    console.log('  Fullscreen: Ctrl+Alt+F');
                } else {
                    // all CDNs failed
                    setLibraryStatus('✗ failed', true);
                    overlay.classList.add('visible');
                    spinner.style.display = 'none';
                    overlayText.innerHTML =
                        '<strong>Library Error</strong> · Could not load v86 from any CDN.<br>' +
                        'Please check your internet connection or try a different network.<br>' +
                        '<span style="font-size:12px;opacity:0.5;">You can also load the library manually.</span>';
                    console.error('All CDN attempts failed.');
                }
            })();

            // Expose for debugging
            window.__vm = {
                emulator: () => emulator,
                state: () => vmState,
                start: startVM,
                pause: togglePause,
                reset: resetVM,
                loadImage: loadImage,
            };

        })();
    </script>

</body>
</html>
