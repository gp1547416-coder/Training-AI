<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Markdown AI – Train on .md file</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
    textarea, pre { width: 100%; box-sizing: border-box; }
    button { margin: 0.5rem 0.5rem 0.5rem 0; padding: 0.5rem 1.2rem; cursor: pointer; }
    .output { background: #f4f4f4; padding: 1rem; border-radius: 6px; white-space: pre-wrap; min-height: 3em; }
    label { font-weight: bold; }
  </style>
</head>
<body>
  <h1>📝 Markdown AI</h1>
  <p>Train a tiny language model on your Markdown file and generate new text in its style.</p>

  <label>1. Choose a .md file:</label><br>
  <input type="file" id="fileInput" accept=".md,.markdown,.txt"><br><br>

  <button id="trainBtn">⚡ Train AI</button>
  <span id="status"></span>

  <br><br>
  <label>2. Prompt (optional):</label><br>
  <textarea id="prompt" rows="2" placeholder="Start of the generated text..."></textarea><br>

  <label>Max words:</label>
  <input type="number" id="maxWords" value="50" min="5" max="200" style="width:6em;"><br>

  <button id="generateBtn" disabled>✨ Generate</button>

  <h3>Generated text</h3>
  <div class="output" id="generatedOutput"></div>

  <script>
    // ---------- Simple trigram Markov chain ----------
    let trigramModel = null;

    // Clean Markdown -> plain text (basic stripping)
    function stripMarkdown(md) {
      let text = md;
      // code blocks (inline & fenced)
      text = text.replace(/```[\s\S]*?```/g, ' ');
      text = text.replace(/`[^`]+`/g, ' ');
      // images, keep alt text
      text = text.replace(/!\[([^\]]*)\]\([^\)]+\)/g, '$1');
      // links, keep text
      text = text.replace(/\[([^\]]*)\]\([^\)]+\)/g, '$1');
      // headers
      text = text.replace(/^#{1,6}\s+/gm, '');
      // bold / italic
      text = text.replace(/\*{1,3}([^\*]+)\*{1,3}/g, '$1');
      text = text.replace(/_{1,3}([^_]+)_{1,3}/g, '$1');
      // list markers, blockquotes, horizontal rules
      text = text.replace(/^[\-\*\+]\s+/gm, '');
      text = text.replace(/^>\s+/gm, '');
      text = text.replace(/^[\-\*\_]{3,}\s*$/gm, '');
      // collapse whitespace
      text = text.replace(/\s+/g, ' ').trim();
      return text;
    }

    // Build trigram model: map (wordA, wordB) -> [nextWord1, nextWord2, ...]
    function buildTrigramModel(plainText) {
      const words = plainText.split(/\s+/).filter(w => w.length > 0);
      if (words.length < 3) return null;
      const model = new Map();
      for (let i = 0; i < words.length - 2; i++) {
        const key = words[i] + '|||' + words[i+1];
        const next = words[i+2];
        if (!model.has(key)) model.set(key, []);
        model.get(key).push(next);
      }
      return { model, allWords: words };
    }

    // Generate from prompt (or random start)
    function generateFromModel(trigramData, prompt, maxWords) {
      const { model, allWords } = trigramData;
      const promptWords = prompt.trim().split(/\s+/).filter(w => w.length > 0);
      let generated = [...promptWords];

      // If prompt has at least 2 words, use last two as seed; otherwise pick random
      if (generated.length < 2) {
        // pick random starting pair from allWords
        const randIdx = Math.floor(Math.random() * (allWords.length - 2));
        generated = [allWords[randIdx], allWords[randIdx+1]];
      }

      while (generated.length < promptWords.length + maxWords) {
        const w1 = generated[generated.length - 2];
        const w2 = generated[generated.length - 1];
        const key = w1 + '|||' + w2;
        const candidates = model.get(key);
        if (!candidates || candidates.length === 0) break; // no continuation
        const next = candidates[Math.floor(Math.random() * candidates.length)];
        generated.push(next);
      }
      return generated.join(' ');
    }

    // ---------- UI logic ----------
    const fileInput = document.getElementById('fileInput');
    const trainBtn = document.getElementById('trainBtn');
    const generateBtn = document.getElementById('generateBtn');
    const statusSpan = document.getElementById('status');
    const promptArea = document.getElementById('prompt');
    const maxWordsInput = document.getElementById('maxWords');
    const outputDiv = document.getElementById('generatedOutput');

    trainBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) {
        statusSpan.textContent = '❌ Please select a .md file first.';
        return;
      }
      statusSpan.textContent = '⏳ Reading file...';
      try {
        const text = await file.text();
        const plain = stripMarkdown(text);
        statusSpan.textContent = '⚙️ Training trigram model...';
        // Use setTimeout to allow UI update
        setTimeout(() => {
          const trigramData = buildTrigramModel(plain);
          if (!trigramData) {
            statusSpan.textContent = '❌ Not enough words in the file (need >2).';
            generateBtn.disabled = true;
            return;
          }
          trigramModel = trigramData;
          statusSpan.textContent = `✅ Model trained (${trigramData.allWords.length} words).`;
          generateBtn.disabled = false;
        }, 10);
      } catch (err) {
        statusSpan.textContent = '❌ Error reading file.';
        console.error(err);
      }
    });

    generateBtn.addEventListener('click', () => {
      if (!trigramModel) {
        outputDiv.textContent = 'Train a model first.';
        return;
      }
      const prompt = promptArea.value.trim();
      const maxWords = parseInt(maxWordsInput.value, 10) || 50;
      const output = generateFromModel(trigramModel, prompt, maxWords);
      outputDiv.textContent = output;
    });

    // Enable generate button if model exists after page load (none)
  </script>
</body>
</html>
